name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (directory under mcp-servers/)'
        required: true
        type: choice
        options:
          - email

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build
        run: |
          cd mcp-servers/${{ inputs.package }}
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp-servers/${{ inputs.package }}/dist/
